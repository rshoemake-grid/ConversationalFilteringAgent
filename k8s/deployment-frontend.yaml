apiVersion: apps/v1
kind: Deployment
metadata:
  name: conversational-filtering-agent-frontend
  labels:
    app: conversational-filtering-agent-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: conversational-filtering-agent-frontend
  template:
    metadata:
      labels:
        app: conversational-filtering-agent-frontend
    spec:
      containers:
        - name: frontend
          image: conversational-filtering-agent-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
